<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-flex flex-column bg-white shadow-sm min-vh-100"
                style="position: fixed; top: 0; left: 0;">
                <div class="p-4 mb-3">
                    <h5 class="fw-bold text-primary"><i class="fa-solid fa-check-double me-2"></i> Pro-Task</h5>
                </div>

                <div class="px-3">
                    <div class="nav-item mb-2">
                        <a href="#" class="nav-link p-3 rounded bg-primary text-white shadow-sm">
                            <i class="fa-solid fa-border-all me-3"></i> All Tasks
                        </a>
                    </div>

                    <div class="nav-item mb-2">
                        <a href="#" class="nav-link p-3 text-dark">
                            <i class="fa-regular fa-clock me-3"></i> In Progress
                        </a>
                    </div>
                    <div class="nav-item mb-2">
                        <a href="#" class="nav-link p-3 text-dark">
                            <i class="fa-regular fa-circle-check me-3"></i> Completed
                        </a>
                    </div>
                    <div class="nav-item mb-2">
                        <a href="#" class="nav-link p-3 text-dark">
                            <i class="fa-solid fa-circle-exclamation me-3"></i> Urgent
                        </a>
                    </div>
                    <div class="nav-item mb-2">
                        <a href="#" class="nav-link p-3 text-dark">
                            <i class="fa-solid fa-briefcase me-3"></i> Work
                        </a>
                    </div>
                    <div class="nav-item mb-2">
                        <a href="#" class="nav-link p-3 text-dark">
                            <i class="fa-regular fa-circle-check me-3"></i> Personal
                        </a>
                    </div>
                    <div class="p-3 mt-auto">
                        <hr class="text-secondary mb-4">
                        <p class="text-uppercase text-muted fw-bold mb-3 text-center "
                            style="font-size: 0.75rem; letter-spacing: 1px;">
                             New Projects
                        </p>
                        
                    </div>
                </div>

                <div class="p-3 mt-auto">
                    
                    <button class="btn btn-outline-primary w-100 mb-3" style="border-style: dashed;">
                        <i class="fa-solid fa-plus me-2"></i> New Project
                    </button>
                </div>

            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 bg-light">
            </main>
        </div>
    </div>
</body>

</html>
