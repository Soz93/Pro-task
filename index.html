<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Task Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">

            <nav class="col-md-3 col-lg-2 d-flex flex-column bg-white shadow-sm min-vh-100"
                style="position: fixed; top: 0; left: 0;">

                <div class="">
                    <div class="p-4">
                        <h5 class="fw-bold text-primary"><i class="fa-solid fa-check-double me-2"></i> Pro-Task</h5>
                    </div>

                    <div class="px-3">
                        <div class="nav-item mb-2">
                            <a href="#" class="nav-link p-3 rounded filter-btn active" data-filter="All">
                                <i class="fa-solid fa-border-all me-3"></i> All Tasks
                            </a>
                        </div>
                        <div class="nav-item mb-2">
                            <a href="#" class="nav-link p-3 text-dark filter-btn" data-filter="Completed">
                                <i class="fa-regular fa-circle-check me-3"></i> Completed
                            </a>
                        </div>
                        <div class="nav-item mb-2">
                            <a href="#" class="nav-link p-3 text-dark filter-btn" data-filter="Urgent">
                                <i class="fa-solid fa-circle-exclamation me-3"></i> Urgent
                            </a>
                        </div>
                        <div class="nav-item mb-2">
                            <a href="#" class="nav-link p-3 text-dark filter-btn" data-filter="Work">
                                <i class="fa-solid fa-briefcase me-3"></i> Work
                            </a>
                        </div>
                        <div class="nav-item mb-2">
                            <a href="#" class="nav-link p-3 text-dark filter-btn" data-filter="Personal">
                                <i class="fa-regular fa-user me-3"></i> Personal
                            </a>
                        </div>
                    </div>
                </div>

                <div class="p-3">
                    <hr class="text-secondary mb-4">
                    <p class="text-uppercase text-muted text-center fw-bold mb-3 "
                        style="font-size: 0.75rem; letter-spacing: 1px;">
                        New Projects
                    </p>
                </div>

                <div class="p-3 mt-auto">
                     <button class="btn btn-primary px-4 py-2 rounded-3 shadow-sm" data-bs-toggle="modal"
                        data-bs-target="#taskModal">
                        <i class="fa-solid fa-plus me-2"></i> Add New Task
                    </button>
                </div>

            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 bg-light min-vh-100">

                <header
                    class="d-flex flex-wrap align-items-center justify-content-between py-3 mb-4 border-bottom bg-white px-3 mt-2 rounded shadow-sm">
                    <div class="col-md-6">
                        <form class="position-relative">
                            <i class="fa-solid fa-magnifying-glass position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                            <input type="search" class="form-control ps-5 bg-light border-0 py-2 rounded-pill"
                                placeholder="Search for tasks...">
                        </form>
                    </div>
                    <div class="d-flex align-items-center">
                        <div class="d-flex align-items-center border-start ps-3">
                            <span id="userName" class="me-2 fw-bold text-dark">User</span> 
                            <div id="userAvatar" class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold shadow-sm" 
                                 style="width: 40px; height: 40px; font-size: 0.9rem;">
                                U
                            </div>
                        </div>
                    </div>
                </header>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h3 class="fw-bold mb-0">Task Overview</h3>
                        <p class="text-muted small">You have <span id="taskCount" class="text-primary fw-bold">0</span> tasks for today.</p>
                    </div>
                   
                </div>

                <div class="row g-4" id="tasksContainer">
                    </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="taskModalLabel">Add New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="taskForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Task Title</label>
                            <input type="text" class="form-control bg-light border-0" id="taskTitle"
                                placeholder="What needs to be done?" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Category</label>
                            <select class="form-select bg-light border-0" id="taskCategory">
                                <option value="Work">Work</option>
                                <option value="Personal">Personal</option>
                                <option value="Urgent">Urgent</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-3" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="taskForm" class="btn btn-primary px-4 rounded-3">Save Task</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="nameModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-body p-4 text-center">
                    <h4 class="fw-bold mb-3">Welcome to Pro-Task!</h4>
                    <p class="text-muted mb-4">Please enter your name to personalize your dashboard.</p>
                    <input type="text" id="nameInput" class="form-control form-control-lg bg-light border-0 text-center mb-3" placeholder="Your Name">
                    <button type="button" id="saveNameBtn" class="btn btn-primary w-100 py-2 rounded-3">Get Started</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
